            - PlaneBufferGeometry
            - [5, 5, 1]
          material:
            - PBRMaterial
            - pbr: "res/core/pbr/angled_tile_floor_a1/a"
              file_format: jpg
              tiling: [4, 4]
              color: "#979798"
