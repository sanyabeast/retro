children:
  floor:
    components:
      body:
        name: MeshComponent
        params:
          rotation: [-1.5707, 0, 0]
          geometry: 
            - PlaneBufferGeometry
            - [20, 20, 1]
          material:
            - PBRMaterial
            - pbr: "res/core/pbr/angled_tile_floor_a1/a"
              file_format: jpg
              tiling: [6, 6]
              color: "#b9c1ce"
  deco:
    components:
      metal_cabinet:
        name: MeshComponent
        params:
          debug_transform: false
          position: [-6, 0, 1]
          rotation: [0, 1.57, 0]
          geometry:
            - "url:res/core/models/metal_cabinet_a1/metal_cabinet_a1.obj"
            - 0.3
          material:
            - AssetMaterial
            - src: "res/core/models/metal_cabinet_a1/metal_cabinet_a1.mtl"
              transparent: false
              doubleside: true
      lamp_a:
        name: LightComponent
        enabled: true
        params:
          position:
            - 0
            - 6
            - -1
          rotation: [-1.57, 0, 0]
          type: RectAreaLight
          intensity: 212
          distance: 40
          rect_width: 2
          rect_height: 0.2
          color: "#eee0e5"
      lamp_b:
        name: LightComponent
        enabled: true
        params:
          position:
            - 0
            - 6
            - 1
          rotation: [-1.57, 0, 0]
          type: RectAreaLight
          intensity: 212
          distance: 40
          rect_width: 2
          rect_height: 0.2
          color: "#e0ecee"
      table:
        name: MeshComponent
        params:
          debug_transform: false
          position: [0, 0, 0]
          rotation: [0, 0, 0]
          scale: [1.2, 1.2, 1.2]
          geometry:
            - "url:res/core/models/wooden-table/Wooden_Table.obj"
            - 0.3
          material:
            - AssetMaterial
            - src: "res/core/models/wooden-table/Wooden_Table.mtl"
              transparent: false
              doubleside: true
      bio_chamber:
        name: MeshComponent
        params:
          debug_transform: false
          position: [-0.1, 2.015, -0.6]
          rotation: [0, 0.1, 0]
          geometry:
            - "url:res/core/models/bio_chamber_unit_a1/bio_chamber_unit_a1.obj"
            - 0.3
          material:
            - AssetMaterial
            - src: "res/core/models/bio_chamber_unit_a1/bio_chamber_unit_a1.mtl"
              transparent: false
              doubleside: true
