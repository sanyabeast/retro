            - color: "#ffffff"
              metalness: 0
              roughness: 0.8
              reflectivity: 0
              shininess: 0
              side: 2
      red_wall:
        name: MeshComponent
        params:
          cast_shadow: true
          recieve_shadow: true
          position: [-1, 1, 0]
          rotation: [0, 1.5707, 0]
          geometry:
            - PlaneBufferGeometry
            - [2, 2, 1]
          material:
            - MeshStandardMaterial
            - color: "#ff0000"
              metalness: 0
              roughness: 0.8
              reflectivity: 0
              shininess: 0
              side: 2
      green_wall:
        name: MeshComponent
        params:
          cast_shadow: true
          recieve_shadow: true
          position: [1, 1, 0]
          rotation: [0, -1.5707, 0]
          geometry:
            - PlaneBufferGeometry
            - [2, 2, 1]
          material:
            - MeshStandardMaterial
            - color: "#00ff00"
              metalness: 0
              roughness: 0.8
              reflectivity: 0
              shininess: 0
              side: 2

