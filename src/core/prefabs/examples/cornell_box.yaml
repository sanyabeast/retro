children:
  lighting:
    components:
      ceil_light:
        name: LightComponent
        tag: "ceil_light"
        params:
          position: [0, 1.8, 0]
          rotation: [-1.5707, 0, 0]
          
          type: PointLight
          distance: 2
          decay: 2
          intensity: 1
          rect_width: 0.6
          rect_height: 0.3
  box:
    components:
      floor:
        name: MeshComponent
        params:
          cast_shadow: true
          recieve_shadow: true
          position: [0, 0, 0]
          rotation: [-1.5707, 0, 0]
          geometry:
            - PlaneBufferGeometry
            - [2, 2, 1]
          material:
            - MeshStandardMaterial
            - color: "#ffffff"
              metalness: 0
              roughness: 0.8
              reflectivity: 0
              shininess: 0
              side: 2
      ceil:
        name: MeshComponent
        params:
          cast_shadow: true
          recieve_shadow: true
          position: [0, 2, 0]
          rotation: [1.5707, 0, 0]
          geometry:
            - PlaneBufferGeometry
            - [2, 2, 1]
          material:
            - MeshStandardMaterial
            - color: "#ffffff"
              emissive: "#c5c3c9"
              emissiveIntensity: 0.5
              metalness: 0
              roughness: 0.8
              reflectivity: 0
              shininess: 0
              side: 2
      back_wall:
        name: MeshComponent
        params:
          cast_shadow: true
          recieve_shadow: true
          position: [0, 1, -1]
          rotation: [0, 0, 0]
          geometry:
            - PlaneBufferGeometry
