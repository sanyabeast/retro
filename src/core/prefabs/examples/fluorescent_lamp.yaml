components:
  body:
    name: MeshComponent
    params:
      debug_transform: false
      rotation: [0, 1.5707, 0]
      recieve_shadow: false
      cast_shadow: false
      geometry:
        - "url:res/core/models/fluorescent_lamp_a1/lamp.obj"
        - 0.125
      material:
        - AssetMaterial
        - src: "res/core/models/fluorescent_lamp_a1/lamp.mtl"
          allow_transparency: false
          doubleside: false
          emissive_intensity: 10
  light:
    name: LightComponent
    enabled: true
    params:
      position: [0, -0.1, 0]
      rotation: [-1.5707, 0, 0]
      type: RectAreaLight
      intensity: 150
      distance: 5
      rect_width: 1
      rect_height: 0.1
      color: "#eee0e5"
  sfx_ambient:
    name: AudioComponent
    params:
      src: "res/core/ambient_sound/fluorescent_lamp_ambience_a1"
      autoplay: true
      max_distance: 4
      loop: true
      volume: 0.7
