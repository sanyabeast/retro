type: ShaderMaterial
params:
  vertexShader: |
    varying vec2 vUv;
    uniform float opacity;
    uniform float cell_scale;

    void main() {
        vUv = uv;
        vec4 pos = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        gl_Position = pos;
    }

  fragmentShader: |
    uniform sampler2D normalBuffer;
    uniform sampler2D depth_buffer;

    uniform sampler2D diffuse_buffer_0;
    uniform sampler2D diffuse_buffer_1;
    uniform sampler2D diffuse_buffer_2;
    uniform sampler2D diffuse_buffer_3;
    uniform sampler2D diffuse_buffer_4;
    uniform sampler2D diffuse_buffer_5;


    #import core.blending
    #import core.convert

    #define QUALITY 10.

    vec3 decode_normal(vec3 n){
      return vec3(
        (n.x * 2.) - 1.,
        (n.y * 2.) - 1.,
        (n.z * 2.) - 1.
      );
    }

    float get_lightness(vec3 c){
      return max(max(c.x, c.y), c.z);
      return (c.x + c.y + c.z) / 3.;
    }

    float get_lightness2(vec3 c){
      vec3 hsv = rgb2hsv(c);
      return hsv.z;
    }

    vec3 get_uv_direction(vec2 uv1, vec2 uv2){
      return vec3(
        vec2(
          uv1.x - uv2.x,
          uv1.y - uv2.y
        ),
        0.
      );
    }

    float get_diffuse_factor1(vec3 s_normal, vec3 l_normal){
      return dot(normalize(s_normal), normalize(l_normal));
    }

    float get_diffuse_factor2(vec3 s_normal, vec3 l_normal){
      return (abs(s_normal.x - l_normal.x) + abs(s_normal.y - l_normal.y) + abs(s_normal.z - l_normal.z)) / 3.;
    }


    vec3 get_temporal_diffuse(vec2 uv){
      //return ((
      //  texture2D(diffuse_buffer_0, uv) +
      //  texture2D(diffuse_buffer_1, uv) +
      //  texture2D(diffuse_buffer_2, uv) +
      //  texture2D(diffuse_buffer_3, uv) +
      //  texture2D(diffuse_buffer_4, uv) +
      //  texture2D(diffuse_buffer_5, uv) +
      //  texture2D(diffuse_buffer_6, uv)
      //) / 5.).xyz;
      float step = 0.01;
      return  mix(
        texture2D(diffuse_buffer_0, uv + vec2(-step, +step)),
        mix(
          texture2D(diffuse_buffer_1, uv + vec2(+step, +step)),
          mix(
            texture2D(diffuse_buffer_2, uv + vec2(-step, -step)),
            mix(
              texture2D(diffuse_buffer_3, uv + vec2(+step, -step)),
              mix(
                texture2D(diffuse_buffer_4, uv + vec2(+step*2., +step*2.)),
                texture2D(diffuse_buffer_5, uv + vec2(-step*2., -step*2.)),
                0.5
              ),
              0.5
            ),
            0.5
          ),
          0.5
        ),
        0.5
      ).xyz;
    }


    void mainImage(const in vec4 inputColor, const in vec2 uv, out vec4 outputColor) {
        outputColor = inputColor;
        vec3 surface_normal = normalize(decode_normal(texture2D(normalBuffer, uv).xyz));
        vec3 scgi_diffuse = vec3(0., 0., 0.);
        vec3 local_diffuse = get_temporal_diffuse(uv).xyz;
        float local_saturation =  rgb2hsv(local_diffuse).z;
        
        for (float y = 0.; y < QUALITY; y++){
          for (float x = 0.; x < QUALITY; x++){
            vec2 light_uv = vec2(x/QUALITY, y/QUALITY);
            vec3 light_diffuse = get_temporal_diffuse(light_uv);
            vec3 light_normal = normalize(decode_normal(texture2D(normalBuffer, light_uv).xyz));
            float light_distance = (distance(uv, light_uv) / sqrt(2.));
            float saturation = rgb2hsv(light_diffuse).z;
            float diffuse_factor = dot(
              surface_normal, 
              -light_normal
            ) + 1.;
            float ligtness = get_lightness(light_diffuse);
            scgi_diffuse = scgi_diffuse + light_diffuse * (pow((1.- light_distance), 5.) * ligtness * clamp(diffuse_factor, 0.01, 10.));
          }
        }

        scgi_diffuse = normalize(scgi_diffuse);
        vec3 scgi_diffuse_hsv = rgb2hsv(scgi_diffuse);
        scgi_diffuse_hsv.y = clamp(scgi_diffuse_hsv.y * 2., 0., 1.);
        scgi_diffuse = hsv2rgb(scgi_diffuse_hsv);
        vec3 applied_color = BlendSoftLight(outputColor.xyz, scgi_diffuse);

        outputColor.xyz = mix(
          outputColor.xyz,
          applied_color,
          0.888
        );

        //if (uv.y < 0.5){
        //  outputColor.xyz = scgi_diffuse;
        //}
    }
  transparent: true
  blending: 1
  uniforms:
    opacity:
      type: f
      value: 1
    normalBuffer:
      type: t
    depth_buffer:
      type: t
    quality:
      type: f
      value: 16
    diffuse_buffer_0:
      type: t
    diffuse_buffer_1:
      type: t
    diffuse_buffer_2:
      type: t
    diffuse_buffer_3:
      type: t
    diffuse_buffer_4:
      type: t
    diffuse_buffer_5:
      type: t
