prefabs: 
  - default.Postprocessing
  - core.sound.default_ambient_audio_source
  - default.controls.OrbitControlsComponent
components:
  phone_light:
    enabled: true
    name: "LightComponent"
    ref: "point_light2"
    tag: "point_light2"
    params:
      position: [-2, 1.1, -2.2]
      shadows_enabled: true
      type: "PointLight"
      intensity: 12
      distance: 5.5
      decay: 1
      color: "#dbaa6c"
  point_light:
    enabled: true
    name: "LightComponent"
    ref: "point_light"
    tag: "point_light"
    params:
      position: [0.6, 1.1, 1.1]
      shadows_enabled: true
      debug_transform: true
      type: "PointLight"
      intensity: 15
      distance: 2.5
      decay: 1
      color: "#ff5722"
  dir_light:
    name: LightComponent
    params:
      type: DirectionalLight
      intensity: 1
      rotation: [1, 1, 1]
      position: [-20, 20, 0]
  sun:
    name: Sun
    tag: sun
    params:
      debug_transform: true
      cycling: 48
      time: 0.33
  fog:  
    name: Fog
    params: 
      density: 0.02
  skybox:
    name: SkyBox
    params:
      cubemap: "res/core/cubemaps/purplenebula"
      cubemap_format: png
