prefabs:
  - default.Postprocessing
  - core.sound.default_ambient_audio_source
  - default.controls.OrbitControlsComponent
components:
  phone_light:
    enabled: true
    name: "LightComponent"
    ref: "point_light2"
    tag: "point_light2"
    params:
      position: [-2, 1.1, -2.2]
      shadows_enabled: true
      type: "PointLight"
      intensity: 12
      distance: 5.5
      decay: 1
      color: "#dbaa6c"
  sun:
    name: Sun
    tag: sun
    params:
      debug_transform: true
      cycling: 12
      time: 0.2
  fog:
    name: Fog
    params:
      density: 0.02
  skybox:
    name: SkyBox
    params:
      cubemap: "res/core/cubemaps/purplenebula"
      cubemap_format: png
  sky_sphere:
    name: SkySphere
    params:
      test: 1
children:
  - children:
      - components:
          tv:
            name: MeshComponent
            params:
              # class: FullscreenRect
              # options:
              #   map: rt:cctv-rt
              #   alphaMap: rt:cctv-rt
              debug_log_this: true
              recieve_shadow: false
              position: [0, 3, 0]
              geometry:
                - BoxBufferGeometry
                - - 0.666
                  - 0.666
                  - 0.666
              material:
                - MeshStandardMaterial
                - map: rt:cctv-rt
                  emissiveMap: res/core/uv_checker_a.jpg
                  emissiveIntensity: 10
                  texture_cache: false
                  transparent: false
          rotator:
            params:
              tick_rate: 30
            inline:
              methods:
                on_tick:
                  body: >
                    let time = (+new Date) / 1000;
                    let mesh = this.get_component("MeshComponent");
                    let speed = 1;
                    mesh.rotation = [
                      Math.sin(time * speed),
                      Math.sin(time * speed),
                      Math.cos(time * speed)
                    ];
          cctv:
            name: RenderTarget
            params:
              override_material: matcap
              tick_rate: 15
              camera_mode: "copy"
              rendering_layers: { gizmo: true, rendering: true }
              render_target_id: "cctv-rt"
              width: 256
              height: 256
  - children:
      - components:
          ocean:
            name: Water
            params:
              position: [0, -0.1, 0]
      - ??prefab=core.scenes.default_snow_scene
      - components:
          # spine3:
          #   enabled: true
          #   name: SpineAnimationPlayer
