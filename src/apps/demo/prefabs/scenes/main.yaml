            params:
              debug_transform: false
              position:
                - 1.6
                - 0
                - -1.5
              geometry:
                - "url:res/core/models/monsterra/monsterra.obj"
                - 0.1
              material:
                - AssetMaterial
                - color: "#daefe5"
