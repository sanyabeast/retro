          lantern_core:
            name: MeshComponent
            params:
              position:
                - 0
                - 1.1
                - 0
              material:
                - MeshBasicMaterial
                - fog: false
                  emissive: "#ff0000"
                  emissiveIntensity: 0.5

              geometry:
                - SphereBufferGeometry
                - - 0.03
                  - 6
                  - 9
      - children:
          - position: [1, 0, 0]
            children:
              - position: [-6, 0, 0]
