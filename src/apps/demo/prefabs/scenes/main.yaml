                      geometry:
                        - "url:res/core/models/wood_fence_a1/linker_1.obj"
                        - 1
                      material:
                        - AssetMaterial
                        - color: "#daefe5"
                          src: "res/core/models/wood_fence_a1/linker_1.mtl"
                  fence_a:
                    name: MeshComponent
                    params:
                      position:
                        - 0
                        - 0
                        - 0
                      geometry:
                        - "url:res/core/models/wood_fence_a1/fence_1.obj"
                        - 1
                      material:
                        - AssetMaterial
                        - color: "#daefe5"
                          doubleside: true
                          src: "res/core/models/wood_fence_a1/fence_1.mtl"
              - position: [3, 0, 0]
                rotation: [0, -2, 0]
                components:
                  linker_1:
                    name: MeshComponent
                    params:
                      position:
                        - 0
                        - 0
                        - 0
                      geometry:
                        - "url:res/core/models/wood_fence_a1/linker_1.obj"
                        - 1
                      material:
                        - AssetMaterial
                        - color: "#daefe5"
                          src: "res/core/models/wood_fence_a1/linker_1.mtl"
                  fence_a:
                    name: MeshComponent
                    params:
                      position:
                        - 0
                        - 0
