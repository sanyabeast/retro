                - -2.2
              rotation: [0, 1, 0]
              geometry:
                - "url:res/demo/models/phone/phone.obj"
                - 2
              material:
                - AssetMaterial
                - color: "#daefe5"
                  src: "res/demo/models/phone/phone.mtl"
          chalkboard:
            name: MeshComponent
            params:
              debug_transform: false
              position:
                - 2
                - 0
                - 2.2
              rotation: [0, -2, 0]
              geometry:
                - "url:res/core/models/rest_chalkboard_1/chalkboard.obj"
                - 0.3
              material:
                - AssetMaterial
                - src: "res/core/models/rest_chalkboard_1/chalkboard.mtl"
                  transparent: false
                  doubleside: true
          # lantern:
          #   name: MeshComponent
          #   params:
          #     recieve_shadow: false
          #     position:
          #       - 0
          #       - 1
