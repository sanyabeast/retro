                        - "url:res/core/models/wood_fence_a1/fence_1.obj"
                        - 1
                      material:
                        - AssetMaterial
                        - color: "#daefe5"
                          doubleside: true
                          src: "res/core/models/wood_fence_a1/fence_1.mtl"
              - position: [3.9, 0, 1.9]
                rotation: [0, -1.2, 0]
                components:
                  linker_1:
                    name: MeshComponent
                    params:
                      position:
                        - 0
                        - 0
                        - 0
                      geometry:
                        - "url:res/core/models/wood_fence_a1/linker_1.obj"
                        - 1
                      material:
                        - AssetMaterial
                        - color: "#daefe5"
                          src: "res/core/models/wood_fence_a1/linker_1.mtl"
                  fence_a:
                    name: MeshComponent
                    params:
                      position:
                        - 0
                        - 0
                        - 0
                      geometry:
                        - "url:res/core/models/wood_fence_a1/fence_1.obj"
                        - 1
                      material:
                        - AssetMaterial
                        - color: "#daefe5"
                          doubleside: true
                          src: "res/core/models/wood_fence_a1/fence_1.mtl"
      - components:
          bush_1:
            name: MeshComponent
            tag: bush
            params:
              position:
                - -2
                - 0
                - 1.5
              geometry:
                - "url:res/core/models/monsterra/monsterra.obj"
                - 0.07
              material:
                - AssetMaterial
                - color: "#daefe5"
                  src: "res/core/models/monsterra/monsterra.mtl"
          collider:
            name: Collider
            params:
              collider_type: sphere
              sphere_radius: 0.5
              box_size: [1.1, 1.1, 1.1]
              offset: [0, 0.5, 0]
      - components:
          point_light:
            enabled: true
            name: "LightComponent"
            ref: "point_light"
            tag: "point_light"
            params:
              position: [0.6, 1.1, 1.1]
              shadows_enabled: true
              debug_transform: true
              type: "PointLight"
              intensity: 15
              distance: 5.5
              decay: 1
              color: "#ff5722"
          controller:
            inline:
              props:
                speed: 0.2
                radius: 4
                height: 1
                height_speed: 0.5
                offset: [0, 2, 0]
              methods:
                on_tick:
                  body: >
                    let date = +new Date();
                    let light = this.get_component("LightComponent");
                    light.position = [
                      (Math.sin(date * 0.001 * this.speed) * this.radius) + this.offset[0],
                      (Math.sin(date * 0.001 * this.height_speed) * this.height) + this.offset[1],
                      (Math.cos(date * 0.001 * this.speed) * this.radius) + this.offset[2]
                    ];
                    light.intensity = 16 + (Math.sin(date * 0.01)) * 0.1
